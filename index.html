<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>健康人格测试</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000;--bg2:#111;--bg3:#1c1c1e;
  --card:#1c1c1e;--card2:#2c2c2e;
  --text:#f5f5f7;--text2:#a1a1a6;--text3:#6e6e73;
  --green:#30d158;--green2:#248a3d;--green-bg:rgba(48,209,88,.08);
  --blue:#0a84ff;--blue-bg:rgba(10,132,255,.08);
  --orange:#ff9f0a;--orange-bg:rgba(255,159,10,.08);
  --pink:#ff375f;--pink-bg:rgba(255,55,95,.08);
  --purple:#bf5af2;--purple-bg:rgba(191,90,242,.08);
  --radius:16px;--radius-sm:12px;
  --font-cn:-apple-system,"PingFang SC","Noto Sans SC","Helvetica Neue",sans-serif;
  --font-en:"Outfit",var(--font-cn);
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{
  font-family:var(--font-cn);background:var(--bg);color:var(--text);
  min-height:100dvh;overflow-x:hidden;
  display:flex;justify-content:center;
}
#app{width:100%;max-width:440px;min-height:100dvh;position:relative;overflow:hidden}

/* ===== Screens ===== */
.screen{
  position:absolute;inset:0;padding:0 24px;
  display:flex;flex-direction:column;
  opacity:0;transform:translateY(20px);
  pointer-events:none;transition:opacity .5s var(--ease),transform .5s var(--ease);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.screen::-webkit-scrollbar{display:none}
.screen.active{opacity:1;transform:translateY(0);pointer-events:auto;z-index:2}
.screen.exit{opacity:0;transform:translateY(-20px);pointer-events:none;position:absolute;z-index:1}

/* ===== Progress Bar ===== */
.progress-wrap{
  position:sticky;top:0;
  z-index:10;background:linear-gradient(var(--bg),var(--bg) 80%,transparent);
  padding-top:env(safe-area-inset-top,12px);padding-bottom:12px;
}
.progress-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));
  border-radius:2px;transition:width .6s var(--ease);width:0}
.progress-text{font-size:12px;color:var(--text3);margin-top:6px;
  font-family:var(--font-en);letter-spacing:.5px}

/* ===== Landing ===== */
.landing{
  min-height:100%;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;padding-top:0;
}
.landing-glow{
  position:absolute;top:-120px;left:50%;transform:translateX(-50%);
  width:360px;height:360px;
  background:radial-gradient(circle,rgba(48,209,88,.12) 0%,rgba(10,132,255,.06) 40%,transparent 70%);
  border-radius:50%;filter:blur(40px);pointer-events:none;
  animation:glow-pulse 4s ease-in-out infinite;
}
@keyframes glow-pulse{0%,100%{opacity:.6;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.1)}}
.landing h1{font-size:28px;font-weight:700;line-height:1.3;margin-bottom:12px;letter-spacing:-.5px}
.landing .subtitle{
  font-size:clamp(11px,3.4vw,14px);color:var(--text2);line-height:1.5;margin-bottom:40px;
  max-width:none;
}
.landing .subtitle-line{
  display:block;
  white-space:nowrap;
}
.landing-features{
  display:flex;gap:20px;margin-bottom:40px;justify-content:center;
}
.landing-feat{text-align:center}
.landing-feat-num{
  font-family:var(--font-en);font-size:24px;font-weight:600;
  background:linear-gradient(135deg,var(--green),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.landing-feat-label{font-size:12px;color:var(--text3);margin-top:2px}

.btn-primary{
  display:inline-flex;align-items:center;justify-content:center;
  height:52px;padding:0 40px;border-radius:26px;border:none;cursor:pointer;
  font-size:17px;font-weight:600;font-family:var(--font-cn);
  color:#fff;background:var(--green);
  box-shadow:0 4px 24px rgba(48,209,88,.35);
  transition:all .3s var(--ease);position:relative;overflow:hidden;
}
.btn-primary::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.15) 50%,transparent 60%);
  transform:translateX(-100%);transition:transform .6s;
}
.btn-primary:hover::after{transform:translateX(100%)}
.btn-primary:active{transform:scale(.97);box-shadow:0 2px 12px rgba(48,209,88,.25)}

.landing-credit{
  font-size:13px;color:var(--text3);margin-top:32px;
}
.landing-credit span{color:var(--text2)}
.landing-books{font-size:11px;color:var(--text3);margin-top:8px;font-style:italic}
.author-link{
  color:var(--text2);text-decoration:none;position:relative;
  transition:color .25s var(--ease),opacity .25s var(--ease);
}
.author-link::after{
  content:'';
  position:absolute;left:0;bottom:-2px;
  width:100%;height:1px;
  background:linear-gradient(90deg,var(--green),var(--blue));
  transform:scaleX(0);transform-origin:left;
  transition:transform .25s var(--ease);opacity:.85;
}
.author-link:hover{
  color:#fff;
}
.author-link:hover::after{transform:scaleX(1)}
.author-link:active{opacity:.8}

/* ===== Questions ===== */
.q-module{font-size:12px;color:var(--green);font-weight:500;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:8px;margin-top:20px;font-family:var(--font-en)}
.q-title{font-size:20px;font-weight:600;line-height:1.5;margin-bottom:24px;letter-spacing:-.2px}
.q-options{display:flex;flex-direction:column;gap:10px;padding-bottom:32px}
.q-opt{
  background:var(--card);border:1.5px solid transparent;border-radius:var(--radius-sm);
  padding:16px 18px;cursor:pointer;transition:all .3s var(--ease);
  display:flex;align-items:flex-start;gap:12px;position:relative;
  -webkit-tap-highlight-color:transparent;
}
@media (hover:hover) and (pointer:fine){
  .q-opt:hover{border-color:rgba(255,255,255,.08);background:var(--card2)}
}
.q-opt.selected{border-color:var(--green);background:var(--green-bg)}
.q-opt.selected .q-opt-letter{background:var(--green);color:#fff}
.q-opt-letter{
  flex-shrink:0;width:28px;height:28px;border-radius:8px;
  background:var(--card2);color:var(--text3);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-en);font-size:13px;font-weight:600;
  transition:all .3s var(--ease);
}
.q-opt-text{font-size:15px;line-height:1.55;color:var(--text);padding-top:3px}

/* Science Egg */
.q-egg{
  max-height:0;overflow:hidden;transition:max-height .5s var(--ease),opacity .4s var(--ease);
  opacity:0;
}
.q-egg.show{max-height:200px;opacity:1}
.q-egg-inner{
  margin-top:12px;padding:14px 16px;
  background:var(--bg2);border-radius:var(--radius-sm);
  border-left:3px solid var(--blue);
}
.q-egg-inner p{font-size:13px;line-height:1.65;color:var(--text2)}
.egg-emoji{margin-right:6px}

/* Age encouragement */
.q-encourage{
  max-height:0;overflow:hidden;opacity:0;
  transition:max-height .5s var(--ease),opacity .4s var(--ease);
}
.q-encourage.show{max-height:80px;opacity:1}
.q-encourage-inner{
  margin-top:12px;padding:12px 16px;
  background:var(--green-bg);border-radius:var(--radius-sm);
  font-size:13px;line-height:1.6;color:var(--green);
}

/* Next button */
.q-next-wrap{padding:8px 0 40px;padding-bottom:max(40px,env(safe-area-inset-bottom))}
.btn-next{
  width:100%;height:50px;border-radius:14px;border:none;cursor:pointer;
  font-size:16px;font-weight:600;font-family:var(--font-cn);
  color:#fff;background:var(--green);
  opacity:0;transform:translateY(8px);
  transition:all .35s var(--ease);pointer-events:none;
}
.btn-next.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.btn-next:active{transform:scale(.98)}

/* ===== Result Page ===== */
.result{padding-top:48px;padding-bottom:60px}
.result-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;
  margin-bottom:20px;font-family:var(--font-en);letter-spacing:.5px;
}
.result-name{font-size:30px;font-weight:700;line-height:1.3;margin-bottom:4px}
.result-name-en{font-family:var(--font-en);font-size:16px;font-weight:400;
  color:var(--text3);margin-bottom:16px;letter-spacing:.5px}
.result-tagline{font-size:16px;line-height:1.6;margin-bottom:32px}

/* Activity Rings */
.rings-wrap{
  display:flex;align-items:center;justify-content:center;
  gap:32px;margin-bottom:36px;padding:28px 0;
  background:var(--bg2);border-radius:var(--radius);
}
.ring-container{position:relative;width:100px;height:100px}
.ring-container svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg3);stroke-width:8}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;
  transition:stroke-dashoffset 1.5s var(--ease);stroke-dashoffset:251.2}
.ring-label{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;
}
.ring-score{font-family:var(--font-en);font-size:22px;font-weight:600}
.ring-title{font-size:10px;color:var(--text3);margin-top:1px}

/* Advice Cards */
.advice-section{margin-top:28px}
.advice-section-title{font-size:13px;color:var(--text3);font-weight:500;
  margin-bottom:16px;letter-spacing:.5px}
.advice-card{
  background:var(--card);border-radius:var(--radius);
  padding:20px;margin-bottom:12px;
  border-left:3px solid var(--green);
}
.advice-card h3{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:10px}
.advice-card p{font-size:14px;line-height:1.7;color:var(--text2);margin-bottom:12px}
.advice-action{
  font-size:13px;line-height:1.6;padding:12px 14px;
  background:var(--bg2);border-radius:var(--radius-sm);
}

/* Cross validation note */
.cross-note{
  margin-top:20px;padding:16px;border-radius:var(--radius-sm);
  background:var(--bg2);border:1px solid rgba(255,255,255,.06);
  font-size:13px;line-height:1.65;color:var(--text2);
}

/* Share Section */
.share-section{
  margin-top:32px;text-align:center;
  padding:24px 0 20px;
}
.share-section p{font-size:13px;color:var(--text3);margin-bottom:16px}
.btn-share{
  display:inline-flex;align-items:center;gap:8px;
  height:48px;padding:0 32px;border-radius:24px;border:none;cursor:pointer;
  font-size:15px;font-weight:600;font-family:var(--font-cn);
  color:#fff;background:linear-gradient(135deg,var(--green),var(--blue));
  box-shadow:0 4px 20px rgba(48,209,88,.25);
  transition:all .3s var(--ease);
}
.btn-share:active{transform:scale(.97)}
.btn-share svg{width:18px;height:18px}
.btn-restart{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:16px;height:40px;padding:0 24px;border-radius:20px;
  border:1px solid rgba(255,255,255,.12);background:transparent;
  cursor:pointer;font-size:13px;color:var(--text3);font-family:var(--font-cn);
  transition:all .3s var(--ease);
}
.btn-restart:hover{border-color:rgba(255,255,255,.2);color:var(--text2)}

/* ===== Share Card (modal) ===== */
.share-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  display:flex;align-items:center;justify-content:center;
  z-index:100;opacity:0;pointer-events:none;
  transition:opacity .4s var(--ease);padding:20px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.share-overlay.show{opacity:1;pointer-events:auto}
.share-card{
  width:min(92vw,360px);text-align:center;
  transform:scale(.96);transition:transform .35s var(--ease);
  position:relative;overflow:visible;
  display:flex;flex-direction:column;align-items:center;
}
.share-overlay.show .share-card{transform:scale(1)}
#share-capture{
  position:fixed;left:-9999px;top:0;
  width:450px;height:600px;box-sizing:border-box;
  padding:48px 40px 72px;
  background:#1D1D1F;color:#fff;
  display:flex;flex-direction:column;
  pointer-events:none;z-index:-1;
}
.share-export-name{
  font-size:34px;line-height:1.2;font-weight:700;letter-spacing:.2px;
  margin-bottom:8px;text-align:center;
}
.share-export-en{
  font-size:15px;line-height:1.4;font-weight:300;letter-spacing:.9px;
  color:#8E8E93;margin-bottom:24px;text-align:center;
}
.share-export-tagline{
  font-size:17px;line-height:1.6;color:#fff;text-align:center;
  margin-bottom:24px;
}
.share-export-quote{
  background:#2C2C2E;border-radius:16px;padding:24px;margin-bottom:32px;
}
.share-export-quote-title{
  font-size:15px;line-height:1.6;color:#fff;font-weight:600;text-align:center;
  margin-bottom:8px;
}
.share-export-quote-text{
  font-size:14.5px;line-height:1.6;color:#E5E5EA;text-align:center;
}
.share-export-source{
  font-size:12px;line-height:1.4;color:#8E8E93;text-align:center;margin-top:12px;
}
.share-export-footer{
  margin-top:auto;padding-top:24px;padding-bottom:32px;text-align:center;
}
.share-export-bless{
  font-size:14px;line-height:1.4;color:#fff;margin-bottom:10px;
}
.share-export-sign{
  font-size:12px;line-height:1.4;color:#6E6E73;margin-bottom:6px;
}
.share-export-author{
  color:#6E6E73;text-decoration:none;
}
.share-export-link{
  font-size:11px;line-height:1.3;color:#6E6E73;
}
.share-save-wrap{
  position:relative;
  width:100%;
}
.share-save-loading{
  font-size:12px;color:#8E8E93;padding:12px 0;
}
.share-save-img{
  display:none;width:100%;aspect-ratio:3/4;object-fit:cover;
  border-radius:0;border:none;background:#1D1D1F;
}
.share-save-img.ready{display:block}
.share-save-tip{
  margin-top:16px;font-size:13px;line-height:1.4;color:#6E6E73;text-align:center;
}
.share-close{
  position:absolute;top:-14px;right:-4px;width:32px;height:32px;
  border-radius:50%;background:rgba(255,255,255,.08);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text3);z-index:2;transition:background .2s;
}
.share-close:hover{background:rgba(255,255,255,.14)}

/* ===== Animations ===== */
@keyframes fade-up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fade-up .5s var(--ease) both}
.delay-1{animation-delay:.1s}.delay-2{animation-delay:.2s}
.delay-3{animation-delay:.3s}.delay-4{animation-delay:.4s}
.delay-5{animation-delay:.5s}

/* Responsive */
@media(max-width:380px){
  .landing h1{font-size:24px}
  .q-title{font-size:18px}
  .result-name{font-size:26px}
  .rings-wrap{gap:20px;padding:20px 0}
  .ring-container{width:85px;height:85px}
}
</style>
</head>
<body>
<div id="app">

<!-- Landing -->
<div class="screen active" id="screen-landing">
  <div class="landing">
    <div class="landing-glow"></div>
    <h1 class="animate-in">你的身体，<br>是哪种人格？</h1>
    <p class="subtitle animate-in delay-1"><span class="subtitle-line">2 分钟了解你的恢复力与行动力</span><span class="subtitle-line">基于《Why We Sleep》《Outlive》《Exercised》</span></p>
    <div class="landing-features animate-in delay-2">
      <div class="landing-feat">
        <div class="landing-feat-num">15</div>
        <div class="landing-feat-label">真实场景</div>
      </div>
      <div class="landing-feat">
        <div class="landing-feat-num">2</div>
        <div class="landing-feat-label">核心维度</div>
      </div>
      <div class="landing-feat">
        <div class="landing-feat-num">4</div>
        <div class="landing-feat-label">专属人格</div>
      </div>
    </div>
    <button class="btn-primary animate-in delay-3" onclick="startTest()">开始测试</button>
    <div class="landing-credit animate-in delay-4">by <a class="author-link" href="https://xhslink.com/m/2WD4NkxZgNN" target="_blank" rel="noopener noreferrer">@一龙小包子</a></div>
  </div>
</div>

<!-- Question Screen (template, built dynamically) -->
<div class="screen" id="screen-question"></div>

<!-- Result Screen -->
<div class="screen" id="screen-result"></div>

</div>

<!-- Share Card Overlay -->
<div class="share-overlay" id="share-overlay" onclick="closeShare(event)">
  <div class="share-card" id="share-card">
    <button class="share-close" onclick="closeShare(event)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
// ===== DATA =====
const questions = [
  // Module A: Q1-Q4 (no scoring)
  {
    id:'Q1', module:'A · 关于你', title:'你的性别',
    options:[
      {label:'A',text:'🏃‍♂️ 男'},
      {label:'B',text:'🏃‍♀️ 女'},
      {label:'C',text:'🌈 其他'},
      {label:'D',text:'🐱 不想说'},
    ]
  },
  {
    id:'Q2', module:'A · 关于你', title:'你的年龄',
    options:[
      {label:'A',text:'🌱 18-25 岁'},
      {label:'B',text:'🚀 26-35 岁'},
      {label:'C',text:'⚡️ 36-45 岁'},
      {label:'D',text:'💪 46 岁以上'},
    ],
    encouragements:[
      '身体可塑性最强的阶段，现在种下的每一颗种子都会加倍生长',
      '打底盘的黄金窗口，这个阶段建立的习惯会成为未来几十年的地基',
      '质量比数量更重要，聪明地动、认真地睡，效率是你最大的杠杆',
      '每一步都在重新定义可能性，你比自己以为的拥有更多主动权',
    ]
  },
  {
    id:'Q3', module:'A · 关于你', title:'你最关心哪一件事',
    options:[
      {label:'A',text:'睡更好、精力更足'},
      {label:'B',text:'体能更强、更有力'},
      {label:'C',text:'减重或改变体型'},
      {label:'D',text:'长期健康、延缓衰老'},
    ]
  },
  {
    id:'Q4', module:'A · 关于你', title:'你现在大致的运动状态是',
    options:[
      {label:'A',text:'几乎从不运动'},
      {label:'B',text:'偶尔运动，每周 1-2 次且不规律'},
      {label:'C',text:'规律运动，每周 3-4 次'},
      {label:'D',text:'高频训练，每周 5 次以上'},
    ]
  },
  // Module B: Q5-Q15 (scored)
  {
    id:'Q5', module:'B · 你的生活', 
    title:'周五你因为工作连续奋战到凌晨一点多。周六早上，你会',
    options:[
      {label:'A',text:'睡到中午，用一个长觉把昨晚欠的睡眠补回来，下午躺着休息',r:0,o:0,
       egg:'「补觉」会打乱生物钟的锚点，实验显示它能延迟恢复睡眠节律长达数天。'},
      {label:'B',text:'尽量在平时差不多的时间起床，虽然困，但出门走一走，下午早睡',r:3,o:2,
       egg:'固定起床时间是昼夜节律系统的核心锚点；轻度活动能加速腺苷代谢，缩短恢复期。'},
      {label:'C',text:'按时起床，但完全没力气动，就在家发呆、刷手机，晚上早点睡',r:2,o:0,
       egg:'维持起床时间保护了节律，但缺乏活动意味着肌肉的抗炎信号仍然缺席。'},
      {label:'D',text:'睡到10点多，起来后去健身房练一场，但又熬到凌晨一点多才睡',r:0,o:2,
       egg:'不规律的睡眠窗口会产生「社交时差」，其对代谢的影响程度相当于每周跨两个时区。'},
    ]

// ===== FUNCTIONS =====
function $(sel){return document.querySelector(sel)}
function $$(sel){return document.querySelectorAll(sel)}
function normalizeDashText(text){
  if(!text) return '';
  return text
    .trim()
    .replace(/\s*——+\s*/g, '，')
    .replace(/\s*—\s*/g, '，')
    .replace(/([\u4e00-\u9fff])([A-Za-z0-9]+)/g, '$1 $2')
    .replace(/([A-Za-z0-9]+)([\u4e00-\u9fff])/g, '$1 $2')
    .replace(/([A-Za-z])\+([A-Za-z])/g, '$1 + $2')
    .replace(/，([，。！？])/g, '$1')
    .replace(/[ \t]{2,}/g, ' ');
}
function stripEggSignature(text){
  if(!text) return '';
  return normalizeDashText(text);
}

function switchScreen(from, to){
  const f = $(`#screen-${from}`);
  const t = $(`#screen-${to}`);
  if(f){
    f.classList.remove('active');
    f.classList.add('exit');
    // Clear per-question inline animation styles to avoid overlay artifacts.
    f.style.opacity = '';
    f.style.transform = '';
  }
  setTimeout(()=>{
    if(f)f.classList.remove('exit');
    t.style.opacity = '';
    t.style.transform = '';
    t.classList.add('active');
    t.scrollTop = 0;
  }, from ? 300 : 0);
}

function startTest(){
  currentQ = 0;
  answers = [];
  R = 0; O = 0;
  renderQuestion();
  switchScreen('landing','question');
}

function renderQuestion(){
  const q = questions[currentQ];
  const total = questions.length;
  const progress = ((currentQ) / total * 100);
  const isModuleB = currentQ >= 4;
  
  let html = `
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="progress-text">${currentQ + 1} / ${total}</div>
    </div>
    <div class="q-module">${q.module}</div>
    <div class="q-title">${normalizeDashText(q.title)}</div>
    <div class="q-options">
  `;
  
  q.options.forEach((opt, i) => {
    const hasEgg = isModuleB && opt.egg;
    html += `
      <div>
        <div class="q-opt" data-idx="${i}" onclick="selectOption(${i})">
          <div class="q-opt-letter">${opt.label}</div>
          <div class="q-opt-text">${normalizeDashText(opt.text)}</div>
        </div>
        ${hasEgg ? `
        <div class="q-egg" id="egg-${i}">
          <div class="q-egg-inner">
            <p><span class="egg-emoji">💡</span>${stripEggSignature(opt.egg)}</p>
          </div>
        </div>` : ''}
        ${q.encouragements ? `
        <div class="q-encourage" id="enc-${i}">
          <div class="q-encourage-inner">${normalizeDashText(q.encouragements[i])}</div>
        </div>` : ''}
      </div>
    `;
  });
  
  html += `
    </div>
    <div class="q-next-wrap">
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">下一题</button>
    </div>
  `;
  
  const screen = $('#screen-question');
  screen.innerHTML = html;
  screen.scrollTop = 0;
  
  // Animate progress
  requestAnimationFrame(()=>{
    const fill = screen.querySelector('.progress-fill');
    if(fill) fill.style.width = `${((currentQ + 1) / total * 100)}%`;
  });
}

function selectOption(idx){
  const opts = $$('#screen-question .q-opt');
  const eggs = $$('#screen-question .q-egg');
  const encs = $$('#screen-question .q-encourage');
  
  opts.forEach((o,i)=>{
    o.classList.toggle('selected', i === idx);
  });
  eggs.forEach((e,i)=>{
    e.classList.toggle('show', i === idx);
  });
  encs.forEach((e,i)=>{
    e.classList.toggle('show', i === idx);
  });
  
  answers[currentQ] = idx;
  
  // Show next button after selecting any option.
  const btn = $('#btn-next');
  if(!btn) return;
  btn.classList.add('visible');
}

function nextQuestion(){
  if(answers[currentQ] === undefined) return;
  
  // Score if Module B
  const q = questions[currentQ];
  if(currentQ >= 4){
    const opt = q.options[answers[currentQ]];
    R += opt.r || 0;
    O += opt.o || 0;
  }
  
  currentQ++;
  if(currentQ < questions.length){
    renderQuestion();
  } else {
    showResult();
  }
}

function getPersonality(){
  const highR = R >= 17, highO = O >= 17;
  if(highR && highO) return 'grandmaster';
  if(highR && !highO) return 'volcano';
  if(!highR && highO) return 'achilles';
  return 'nightwalker';
}

function getCrossValidation(){
  const q4 = answers[3]; // Q4 index
  let note = '';
  if(q4 === 3 && O < 10){ // High freq training but low O
    const p = getPersonality();
    if(p === 'achilles'){
      note = '你的训练频率很高，但身体的实际输出效率显示恢复节奏还没跟上——一旦补齐这块，你的训练效果会明显上一个台阶。';
    }
  }
  if(q4 === 0 && O >= 17){ // Never exercise but high O
    note = '你的日常活动量已经在发挥作用——在 Lieberman 的框架里，这完全算数。';
  }
  return note;
}

function ringSVG(score, max, color, size=100, sw=8){
  const r = (size - sw) / 2;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(score / max, 1);
  const offset = circ * (1 - pct);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" class="ring-bg" stroke-width="${sw}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" class="ring-fill" 
      stroke="${color}" stroke-width="${sw}" 
      stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
      data-target="${offset}"/>
  </svg>`;
}
function showResult(){

        <div class="ring-score" style="color:#0a84ff">${O}</div>
        <div class="ring-title">行动力</div>
      </div>
    </div>
  </div>`;
  
  // Portrait
  html += `<p class="animate-in delay-4" style="font-size:14px;line-height:1.75;color:var(--text2);margin-bottom:16px">${normalizeDashText(p.portrait)}</p>`;
  html += `<p class="animate-in delay-5" style="font-size:14px;line-height:1.75;color:var(--text);margin-bottom:8px">${normalizeDashText(p.focus)}</p>`;
  
  // Cross validation
  if(crossNote){
    html += `<div class="cross-note animate-in delay-5">${normalizeDashText(crossNote)}</div>`;
  }
  
  // Advice
  html += `<div class="advice-section">
    <div class="advice-section-title">为你定制的行动建议</div>`;
  
  p.advice.forEach((a, i) => {
    html += `<div class="advice-card animate-in" style="animation-delay:${0.6+i*0.12}s;border-left-color:${p.color}">
      <h3>${normalizeDashText(a.title)}</h3>
      <p>${normalizeDashText(a.body)}<br><span style="font-size:12px;color:var(--text3)">—— ${a.source}</span></p>
      <div class="advice-action" style="color:${p.color}">${normalizeDashText(a.action)}</div>
    </div>`;
  });
  
  html += `</div>`;
  
  // Share
  html += `<div class="share-section animate-in" style="animation-delay:.9s">
    <p>祝人类健康！</p>
    <button class="btn-share" onclick="openShare()">
      <svg viewBox="0 0 20 20" fill="none"><path d="M10 3v10M6 7l4-4 4 4" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13v3a1 1 0 001 1h12a1 1 0 001-1v-3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
      生成分享卡片
    </button>
    <button class="btn-restart" onclick="restart()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 1111.5-2.5M14 2v4h-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      重新测试
    </button>
  </div>`;
  
  html += `</div>`;
  
  const screen = $('#screen-result');
  screen.innerHTML = html;
  switchScreen('question','result');
  
  // Animate rings after appearing
  setTimeout(()=>{
    $$('.ring-fill').forEach(ring => {
      const target = ring.getAttribute('data-target');
      ring.style.strokeDashoffset = target;
    });
  }, 600);
}

async function renderShareSaveImage(){
  const capture = $('#share-capture');
  const outputImg = $('#share-save-img');
  const loading = $('#share-save-loading');
  if(!capture || !outputImg || !loading) return;
  
  try{
    if(typeof html2canvas !== 'function'){
      throw new Error('html2canvas not loaded');
    }
    const scale = 2;
    const canvas = await html2canvas(capture, {
      backgroundColor:'#1D1D1F',
      width:450,
      height:600,
      scale,
      useCORS:true,
    });
    outputImg.src = canvas.toDataURL('image/png', 1);
    outputImg.classList.add('ready');
    loading.style.display = 'none';
  }catch(err){
    loading.textContent = '图片生成失败，请使用系统截图保存';
  }
}

function closeShare(e){
  if(e.target === e.currentTarget || e.target.closest('.share-close')){
    $('#share-overlay').classList.remove('show');
  }
}

function restart(){
  currentQ = 0; answers = []; R = 0; O = 0;
  $('#screen-result').classList.remove('active');
  $('#screen-result').innerHTML = '';
  switchScreen(null,'landing');
}
